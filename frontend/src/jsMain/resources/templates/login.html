<div class="login-page">
    <div id="login-card" class="glass-card login-card">
        <h1 class="login-title">JIRA ASSISTANT</h1>
        <p class="login-subtitle">NEURAL INTELLIGENCE PLATFORM</p>
        <div class="login-form">
            <div>
                <label class="field-label">USERNAME</label>
                <input id="login-username" type="text" class="field-input" placeholder="Enter username" autocomplete="username">
            </div>
            <div>
                <label class="field-label">PASSWORD</label>
                <input id="login-password" type="password" class="field-input" placeholder="Enter password" autocomplete="current-password">
            </div>
            <div id="login-error" class="login-error" style="display:none;"></div>
            <button id="login-btn" class="btn-vibrant login-btn">SIGN IN</button>
        </div>
    </div>
</div>
