<header style="margin-bottom: 40px;">
    <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 8px;">
        <h1 class="page-title" style="margin-bottom: 0;">Predictive Sprint Intelligence</h1>
        <span id="analysisScanStatusBadge" style="display:none; font-size: 12px; padding: 4px 12px; border-radius: 8px; background: rgba(45,254,207,0.1); border: 1px solid rgba(45,254,207,0.2); color: var(--primary); font-weight: 600; letter-spacing: 0.5px;"></span>
    </div>
    <p style="opacity: 0.5;">Velocity trends, bottleneck analysis, and AI-driven sprint insights.</p>
</header>

<!-- Error Banner (hidden by default) -->
<div id="analysis-error" class="glass-card" style="display:none; padding:32px; text-align:center; border-left:4px solid var(--danger); margin-bottom:24px;">
    <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
    <div id="analysis-error-msg" style="font-size:14px;color:var(--danger);margin-bottom:16px;">Failed to load analysis data.</div>
    <div style="display:flex;gap:12px;justify-content:center;">
        <button class="btn-vibrant" id="analysis-retry-btn" style="padding:10px 24px;font-size:12px;">RETRY</button>
        <button id="analysis-integrations-btn" style="padding:10px 24px;font-size:12px;background:rgba(255,255,255,0.05);border:1px solid var(--glass-border);color:var(--text-sub);border-radius:10px;cursor:pointer;font-weight:700;letter-spacing:1px;">GO TO INTEGRATIONS</button>
    </div>
</div>

<!-- 4 Metric Cards -->
<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px;">
    <div class="glass-card" style="text-align: center; padding: 32px 16px; border-left: 4px solid var(--primary);">
        <div id="val-total-tickets" style="font-size: 36px; font-weight: 100; margin-bottom: 8px;">--</div>
        <div style="font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; text-transform: uppercase;">Total Tickets</div>
    </div>
    <div class="glass-card" style="text-align: center; padding: 32px 16px; border-left: 4px solid var(--accent);">
        <div id="val-resolution-rate" style="font-size: 36px; font-weight: 100; margin-bottom: 8px;">--</div>
        <div style="font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; text-transform: uppercase;">Resolution Rate</div>
    </div>
    <div class="glass-card" style="text-align: center; padding: 32px 16px; border-left: 4px solid var(--secondary);">
        <div id="val-cycle-time" style="font-size: 36px; font-weight: 100; margin-bottom: 8px;">--</div>
        <div style="font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; text-transform: uppercase;">Cycle Time (Days)</div>
    </div>
    <div class="glass-card" style="text-align: center; padding: 32px 16px; border-left: 4px solid var(--warning);">
        <div id="val-ai-velocity" style="font-size: 36px; font-weight: 100; margin-bottom: 8px;">--</div>
        <div style="font-size: 10px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; text-transform: uppercase;">AI Velocity</div>
    </div>
</div>

<!-- Velocity Trend Chart -->
<div class="glass-card" style="padding: 32px; margin-bottom: 32px;">
    <div style="font-size: 11px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; margin-bottom: 32px;">VELOCITY TREND (STORY POINTS)</div>
    <div id="velocityBarContainer" style="display: flex; align-items: flex-end; gap: 12px; height: 200px; padding-top: 16px;"></div>
</div>

<!-- Bottleneck Radar Panel -->
<div class="glass-card" style="padding: 32px;">
    <div style="font-size: 11px; font-weight: 700; letter-spacing: 2px; opacity: 0.4; margin-bottom: 24px;">AI BOTTLENECK RADAR</div>
    <div id="bottleneckList" style="display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px;"></div>
    <button class="btn-vibrant" id="btnDiveReports">DIVE INTO REPORTS</button>
</div>
