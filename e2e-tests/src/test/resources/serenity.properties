serenity.project.name=Jira Assistant E2E Tests
serenity.test.root=com.assistant.e2e
webdriver.driver=chrome
headless.mode=false
serenity.console.colors=true
serenity.outputDirectory=target/site/serenity

# Feature file location for report grouping by feature
serenity.features.directory=src/test/resources/features
serenity.requirement.types=capability,feature

# Screenshots: capture after each step for visual verification
serenity.take.screenshots=AFTER_EACH_STEP

# Parallel WebDriver — each thread gets its own browser instance
serenity.batch.strategy=DIVIDE_BY_TEST_COUNT
serenity.use.unique.browser=true
chrome.switches=--no-sandbox,--disable-dev-shm-usage,--disable-gpu,--force-color-profile=srgb
serenity.browser.width=1920
serenity.browser.height=1080

# Giúp hiển thị tên thư mục/feature đẹp hơn trên UI (ví dụ: 'user_auth' thành 'User Auth')
serenity.report.accessibility=true
# Hiển thị chi tiết các bước trong báo cáo tổng quan
serenity.verbose.steps=true
serenity.logging=VERBOSE