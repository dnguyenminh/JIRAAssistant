# JUnit 5 Parallel Execution Configuration (22-core machine)
# junit.jupiter.execution.parallel.enabled=true
# junit.jupiter.execution.parallel.mode.default=concurrent
# junit.jupiter.execution.parallel.mode.classes.default=concurrent
# junit.jupiter.execution.parallel.config.strategy=fixed
# junit.jupiter.execution.parallel.config.fixed.parallelism=12

junit.jupiter.execution.parallel.enabled=true
junit.jupiter.execution.parallel.mode.default=concurrent
junit.jupiter.execution.parallel.mode.classes.default=concurrent



cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=4

# Cucumber JUnit Platform Engine — Serenity BDD 5.x integration
# Enable Cucumber
cucumber.plugin=net.serenitybdd.cucumber.core.plugin.SerenityReporterParallel
# cucumber.glue=com.assistant.e2e.steps
# cucumber.features=src/test/resources/features

# Scenario execution order
cucumber.execution.order=random

# Plugin output
cucumber.plugin=pretty,html:target/cucumber-reports/cucumber.html